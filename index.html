        let currentIndex = 0;
        let isFlipped = false;
        let answerShown = false;

        const cardElement = document.getElementById('flashcard');
        const qNumElement = document.getElementById('question-number');
        const qTextElement = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const answerTextElement = document.getElementById('correct-answer-text');
        const explanationElement = document.getElementById('explanation-text');
        const progressIndicator = document.getElementById('progress-indicator');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const showAnswerBtn = document.getElementById('show-answer-btn');

        function init() {
            renderSlide();
        }

        function renderSlide() {
            const data = quizData[currentIndex];
            
            // Reset states
            if (isFlipped) flipCard(false); // flip to front silently
            answerShown = false;
            
            // Update Text
            qNumElement.textContent = `Question ${data.qNum}`;
            qTextElement.textContent = data.question;
            
            // Render Options
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, idx) => {
                const optDiv = document.createElement('div');
                optDiv.className = 'p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 transition-colors duration-200 option-div';
                optDiv.id = `option-${idx}`;
                optDiv.textContent = opt;
                optionsContainer.appendChild(optDiv);
            });

            // Update Back Face Content
            answerTextElement.textContent = data.options[data.correctIndex];
            explanationElement.textContent = data.explanation;

            // Reset Answer button
            showAnswerBtn.innerHTML = '<i class="ph ph-check-circle text-xl"></i> Show Correct Answer';
            showAnswerBtn.className = 'w-full py-3 px-4 bg-cove-dark hover:bg-cove-light text-white font-medium rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2';
            showAnswerBtn.disabled = false;

            // Update Navigation
            progressIndicator.textContent = `${currentIndex + 1} of ${quizData.length}`;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === quizData.length - 1;
        }

        function showAnswer() {
            if (answerShown) return;
            answerShown = true;
            
            const data = quizData[currentIndex];
            const correctOptDiv = document.getElementById(`option-${data.correctIndex}`);
            
            // Highlight correct answer
            correctOptDiv.classList.remove('border-slate-200', 'dark:border-slate-700', 'bg-white', 'dark:bg-slate-800', 'text-slate-700', 'dark:text-slate-200');
            correctOptDiv.classList.add('border-cove-accent', 'bg-cove-pale', 'dark:bg-cove-dark/60', 'text-cove-dark', 'dark:text-cove-pale', 'font-semibold', 'ring-1', 'ring-cove-accent');

            // Fade other options
            const allOptionDivs = document.querySelectorAll('.option-div');
            allOptionDivs.forEach((div, idx) => {
                if (idx !== data.correctIndex) {
                    div.classList.add('opacity-50');
                }
            });

            // Update Button Status
            showAnswerBtn.innerHTML = '<i class="ph ph-check-circle-fill text-xl"></i> Answer Revealed';
            showAnswerBtn.className = 'w-full py-3 px-4 bg-cove-accent text-slate-900 font-bold rounded-xl transition-colors shadow-sm flex items-center justify-center gap-2';
            showAnswerBtn.disabled = true;
        }

        function flipCard(toggle = true) {
            if (toggle) {
                isFlipped = !isFlipped;
            } else {
                isFlipped = false;
            }
            
            if (isFlipped) {
                cardElement.classList.add('is-flipped');
            } else {
                cardElement.classList.remove('is-flipped');
            }
        }

        function nextSlide() {
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentIndex > 0) {
                currentIndex--;
                renderSlide();
            }
        }

        // Dark Mode Toggle Logic
        function toggleDarkMode() {
            const html = document.documentElement;
            const themeIcon = document.getElementById('theme-icon');
            
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                themeIcon.classList.remove('ph-sun');
                themeIcon.classList.add('ph-moon');
            } else {
                html.classList.add('dark');
                themeIcon.classList.remove('ph-moon');
                themeIcon.classList.add('ph-sun');
            }
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', init);
    </script>
